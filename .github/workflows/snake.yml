name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate contribution animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#1F6FEB&color_dots=#EBEDF0,#C6E5FF,#79C0FF,#388BFD,#1F6FEB
            dist/github-contribution-grid-snake-dark.svg?color_snake=#F0F6FC&color_dots=#161B22,#0D419D,#1F6FEB,#58A6FF,#A371F7
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Keep contribution cells visible
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in Path("dist").glob("*.svg"):
              svg = path.read_text(encoding="utf-8")
              svg = svg.replace(
                  "</style>",
                  ".c{animation-name:none!important}</style>",
                  1,
              )
              path.write_text(svg, encoding="utf-8")
          PY

      - name: Publish animation
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
