<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Frank Teheran — Backend &amp; AI Software Engineer</title>
  <desc id="desc">
    Animated banner with a clean futuristic style for Frank Teheran.
  </desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07111E"></stop>
      <stop offset="38%" stop-color="#0D1117"></stop>
      <stop offset="72%" stop-color="#151223"></stop>
      <stop offset="100%" stop-color="#0A0F16"></stop>
    </linearGradient>

    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(200 140) rotate(25) scale(320 180)">
      <stop stop-color="#1F6FEB" stop-opacity="0.22"></stop>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="glowPurple" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 120) rotate(-10) scale(340 170)">
      <stop stop-color="#A371F7" stop-opacity="0.18"></stop>
      <stop offset="1" stop-color="#A371F7" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="glowRose" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(670 300) rotate(8) scale(260 100)">
      <stop stop-color="#F778BA" stop-opacity="0.10"></stop>
      <stop offset="1" stop-color="#F778BA" stop-opacity="0"></stop>
    </radialGradient>

    <linearGradient id="accent" x1="120" y1="0" x2="1160" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#58A6FF"></stop>
      <stop offset="55%" stop-color="#A371F7"></stop>
      <stop offset="100%" stop-color="#7EE787"></stop>
    </linearGradient>

    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0"></stop>
      <stop offset="20%" stop-color="#58A6FF" stop-opacity="0.9"></stop>
      <stop offset="60%" stop-color="#A371F7" stop-opacity="0.85"></stop>
      <stop offset="100%" stop-color="#7EE787" stop-opacity="0"></stop>
    </linearGradient>

    <linearGradient id="line2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7EE787" stop-opacity="0"></stop>
      <stop offset="30%" stop-color="#58A6FF" stop-opacity="0.65"></stop>
      <stop offset="70%" stop-color="#F778BA" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#A371F7" stop-opacity="0"></stop>
    </linearGradient>

    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"></stop>
      <stop offset="100%" stop-color="#111827"></stop>
    </linearGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="220" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.12"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </linearGradient>

    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"></feGaussianBlur>
    </filter>

    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"></feDropShadow>
    </filter>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#FFFFFF" stroke-opacity="0.04"></path>
    </pattern>

    <clipPath id="clip">
      <rect x="0" y="0" width="1280" height="360" rx="28"></rect>
    </clipPath>

    <path id="pathTop" d="M110 92C230 70 330 140 458 116C590 90 730 40 868 70C994 98 1084 116 1170 92"></path>
    <path id="pathBottom" d="M90 258C228 226 318 192 426 206C570 224 690 246 826 230C970 212 1072 176 1182 186"></path>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1280" height="360" rx="28" fill="url(#bg)"></rect>
    <rect width="1280" height="360" rx="28" fill="url(#grid)"></rect>

    <ellipse cx="200" cy="140" rx="320" ry="180" fill="url(#glowBlue)"></ellipse>
    <ellipse cx="980" cy="120" rx="340" ry="170" fill="url(#glowPurple)"></ellipse>
    <ellipse cx="670" cy="300" rx="260" ry="100" fill="url(#glowRose)"></ellipse>

    <!-- subtle top border -->
    <line x1="92" y1="58" x2="1188" y2="58" stroke="url(#accent)" stroke-opacity="0.22"></line>

    <!-- moving lines kept away from text -->
    <g opacity="0.9">
      <use href="#pathTop" fill="none" stroke="url(#line1)" stroke-width="2.2" stroke-linecap="round"></use>
      <use href="#pathBottom" fill="none" stroke="url(#line2)" stroke-width="1.8" stroke-linecap="round"></use>

      <circle r="4" fill="#58A6FF">
        <animateMotion dur="8s" repeatCount="indefinite" rotate="auto">
          <mpath href="#pathTop"></mpath>
        </animateMotion>
      </circle>

      <circle r="4" fill="#A371F7">
        <animateMotion dur="10s" repeatCount="indefinite" rotate="auto" begin="-2s">
          <mpath href="#pathTop"></mpath>
        </animateMotion>
      </circle>

      <circle r="4" fill="#7EE787">
        <animateMotion dur="9s" repeatCount="indefinite" rotate="auto" begin="-3s">
          <mpath href="#pathBottom"></mpath>
        </animateMotion>
      </circle>

      <circle r="3.5" fill="#F778BA">
        <animateMotion dur="11s" repeatCount="indefinite" rotate="auto" begin="-1s">
          <mpath href="#pathBottom"></mpath>
        </animateMotion>
      </circle>
    </g>

    <!-- side nodes -->
    <g>
      <g transform="translate(116 92)">
        <circle r="10" fill="#0B1220" stroke="#58A6FF" stroke-opacity="0.7"></circle>
        <circle r="5" fill="#58A6FF">
          <animate attributeName="r" values="5;6.5;5" dur="3s" repeatCount="indefinite"></animate>
        </circle>
      </g>

      <g transform="translate(1170 82)">
        <circle r="10" fill="#0B1220" stroke="#A371F7" stroke-opacity="0.7"></circle>
        <circle r="5" fill="#A371F7">
          <animate attributeName="r" values="5;6.5;5" dur="3.2s" repeatCount="indefinite"></animate>
        </circle>
      </g>

      <g transform="translate(96 258)">
        <circle r="9" fill="#0B1220" stroke="#7EE787" stroke-opacity="0.7"></circle>
        <circle r="4.5" fill="#7EE787">
          <animate attributeName="r" values="4.5;6;4.5" dur="2.7s" repeatCount="indefinite"></animate>
        </circle>
      </g>

      <g transform="translate(1182 186)">
        <circle r="9" fill="#0B1220" stroke="#58A6FF" stroke-opacity="0.65"></circle>
        <circle r="4.5" fill="#58A6FF">
          <animate attributeName="r" values="4.5;6;4.5" dur="2.9s" repeatCount="indefinite"></animate>
        </circle>
      </g>
    </g>

    <!-- center panel -->
    <g transform="translate(640 172)" filter="url(#panelShadow)">
      <rect x="-290" y="-88" width="580" height="176" rx="24" fill="#0B1220" fill-opacity="0.58" stroke="#FFFFFF" stroke-opacity="0.08" backdrop-filter="blur(12)"></rect>
    </g>

    <!-- text block -->
    <g transform="translate(640 150)">
      <text x="0" y="0" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="0.4" filter="url(#textGlow)">
        Frank Teheran
      </text>

      <text x="0" y="44" text-anchor="middle" fill="#7CC2FF" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="24" font-weight="600" letter-spacing="0.2">
        Backend &amp; AI Software Engineer
      </text>

      <text x="0" y="76" text-anchor="middle" fill="#D6E2F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">
        APIs · Automation · Applied AI · System Design
      </text>

      <text x="0" y="104" text-anchor="middle" fill="#AAB7C7" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="14">
        Building reliable systems designed to operate beyond the prototype
      </text>
    </g>

    <!-- bottom pills -->
    <g transform="translate(640 276)" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="12.5" text-anchor="middle">
      <g transform="translate(-120 0)">
        <rect x="-72" y="-18" width="144" height="36" rx="18" fill="url(#pill)" stroke="#58A6FF" stroke-opacity="0.22"></rect>
        <text y="4" fill="#D6E2F0">Barranquilla, CO</text>
      </g>

      <g transform="translate(30 0)">
        <rect x="-82" y="-18" width="164" height="36" rx="18" fill="url(#pill)" stroke="#A371F7" stroke-opacity="0.22"></rect>
        <text y="4" fill="#D6E2F0">Backend Systems</text>
      </g>

      <g transform="translate(200 0)">
        <rect x="-62" y="-18" width="124" height="36" rx="18" fill="url(#pill)" stroke="#7EE787" stroke-opacity="0.22"></rect>
        <text y="4" fill="#D6E2F0">Applied AI</text>
      </g>
    </g>

    <!-- soft shine -->
    <g opacity="0.5">
      <rect x="-240" y="0" width="220" height="360" fill="url(#shine)" transform="skewX(-18)">
        <animate attributeName="x" values="-260;1460" dur="8.5s" repeatCount="indefinite"></animate>
      </rect>
    </g>

    <!-- border -->
    <rect x="1.2" y="1.2" width="1277.6" height="357.6" rx="26.8" stroke="#FFFFFF" stroke-opacity="0.08"></rect>
  </g>
</svg>